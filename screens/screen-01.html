<!doctype html>
<!--
  DISCOVERY SCREEN — Foodbridge Module Purchase — "Screen 01: Settlement Workspace"
  ---------------------------------------------------------------------------------
  The core Purchase-Settlement loop, mirrored from the reference UI to the supplier side:
    List → inline mismatch expand → View & Resolve drawer (Details / Evidence / Activity
    Log / Comments) → pick reason → impact preview → Resolve → success ; plus Bulk Resolve.
  Styled with the house design language tokens (resources/design/foodbridge-house-design-language.md).
  Data: ../seed-data/seed.js  (single source; loaded via <script src> as window.SEED, so this page
        opens on a direct double-click — no server needed).
  Outgoing transitions (proto-FSM for SSOT-1 / SSOT-5) are declared in ../index.html.
  HTML/CSS/vanilla JS only. Disposable — informs the SSOTs, not imported by development/.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foodbridge Purchase — Settlement Workspace</title>
  <style>
    :root {
      color-scheme: light;
      /* ── House design tokens ── */
      --fb-teal-800:#1B6272; --fb-teal-600:#217A8E; --fb-teal-50:#E8F5F7;
      --fb-green-600:#43A047; --fb-green-700:#2D7A42; --fb-green-50:#F0FDF4;
      --fb-orange-600:#F97316; --fb-orange-50:#FFF7ED;
      --fb-red-600:#EF4444; --fb-red-50:#FEF2F2;
      --fb-bg:#F0F2F5; --fb-surface:#fff; --fb-border:#E5E7EB; --fb-border-soft:#F1F3F5;
      --fb-text:#111; --fb-text-2:#555; --fb-muted:#888; --fb-placeholder:#9CA3AF;
      --fb-radius-md:12px; --fb-radius-lg:14px; --fb-radius-xl:16px; --fb-radius-2xl:20px; --fb-radius-full:9999px;
      --fb-shadow-card:0 1px 4px rgba(0,0,0,.06);
      --fb-shadow-drawer:-8px 0 40px rgba(0,0,0,.16);
      --fb-ease:cubic-bezier(.4,0,.2,1);
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
      background:var(--fb-bg); color:var(--fb-text); font-size:14px; }
    button { font-family:inherit; cursor:pointer; }
    /* focus ring — accessibility floor */
    :focus-visible { outline:3px solid var(--fb-teal-600); outline-offset:2px; border-radius:6px; }

    /* ── Header (teal, non-interactive) ── */
    header { background:var(--fb-teal-800); color:#fff; padding:14px 24px; display:flex;
      align-items:center; justify-content:space-between; position:sticky; top:0; z-index:5; }
    header .title { font-size:18px; font-weight:700; letter-spacing:.2px; }
    header .sub { font-size:12px; color:rgba(255,255,255,.75); margin-top:2px; }
    header .user { text-align:right; font-size:13px; }
    header .user b { display:block; }
    header .user span { color:rgba(255,255,255,.75); font-size:11px; }

    main { max-width:1180px; margin:0 auto; padding:20px 24px 120px; }

    /* ── KPI stat tiles ── */
    .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:18px; }
    .kpi { background:var(--fb-surface); border:1px solid var(--fb-border); border-radius:var(--fb-radius-lg);
      padding:16px; box-shadow:var(--fb-shadow-card); }
    .kpi .label { font-size:12px; color:var(--fb-text-2); }
    .kpi .value { font-size:28px; font-weight:800; margin:6px 0 2px; font-variant-numeric:tabular-nums; }
    .kpi .sub { font-size:11px; color:var(--fb-muted); }

    /* ── Toolbar ── */
    .toolbar { display:flex; gap:12px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
    .search { flex:1; min-width:220px; }
    .search input { width:100%; padding:12px 14px; border:1px solid var(--fb-border); border-radius:var(--fb-radius-md);
      font-size:14px; background:var(--fb-surface); }
    .chips { display:flex; gap:8px; }
    .chip { padding:9px 14px; border:1px solid var(--fb-border); background:var(--fb-surface); border-radius:var(--fb-radius-full);
      font-size:13px; font-weight:600; color:var(--fb-text-2); min-height:44px; }
    .chip[aria-pressed="true"] { background:var(--fb-teal-50); border-color:var(--fb-teal-600); color:var(--fb-teal-800); }

    /* ── List ── */
    .list { background:var(--fb-surface); border:1px solid var(--fb-border); border-radius:var(--fb-radius-lg); overflow:hidden; }
    .list-head { display:none; }
    .settlement { border-bottom:1px solid var(--fb-border-soft); }
    .row-main { display:flex; align-items:flex-start; gap:12px; width:100%; padding:16px 18px; background:none; border:0; text-align:left; }
    .row-main:hover { background:#FAFBFC; }
    .settlement.expanded > .row-main { background:var(--fb-green-50); }
    .s-main { flex:1; min-width:0; }
    .s-tags { display:flex; flex-wrap:wrap; align-items:center; gap:8px 12px; margin-top:10px; }
    .dot { width:9px; height:9px; border-radius:50%; flex:0 0 auto; margin-top:7px; }
    .dot.high{background:var(--fb-red-600);} .dot.medium{background:var(--fb-orange-600);} .dot.low{background:var(--fb-muted);}
    .s-name { font-weight:700; font-size:15px; }
    .s-meta { font-size:12px; color:var(--fb-muted); margin-top:3px; }
    .badge { display:inline-flex; align-items:center; gap:6px; padding:5px 10px; border-radius:var(--fb-radius-full);
      font-size:12px; font-weight:600; border:1px solid var(--fb-orange-600); color:var(--fb-orange-600); background:var(--fb-orange-50); }
    .status { display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:600; }
    .status .sdot { width:8px; height:8px; border-radius:50%; }
    .status.open{color:var(--fb-green-700);} .status.open .sdot{background:var(--fb-green-600);}
    .status.progress{color:#B45309;} .status.progress .sdot{background:var(--fb-orange-600);}
    .status.done{color:var(--fb-muted);} .status.done .sdot{background:var(--fb-muted);}
    .age { font-size:13px; color:var(--fb-muted); }
    .chev { align-self:center; color:var(--fb-muted); transition:transform .2s var(--fb-ease); }
    .settlement.expanded .chev { transform:rotate(90deg); }

    /* ── Expanded mismatch items ── */
    .items { padding:4px 18px 18px; background:#FCFCFD; }
    .items-title { font-size:11px; letter-spacing:.5px; text-transform:uppercase; color:var(--fb-muted); margin:12px 4px 8px; }
    table.mm { width:100%; border-collapse:collapse; }
    table.mm th { font-size:11px; letter-spacing:.4px; text-transform:uppercase; color:var(--fb-muted); text-align:left;
      padding:8px 10px; font-weight:600; }
    table.mm td { padding:12px 10px; border-top:1px solid var(--fb-border); font-size:14px; vertical-align:middle; }
    table.mm td.num { font-variant-numeric:tabular-nums; }
    .diff { font-weight:700; font-variant-numeric:tabular-nums; }
    .diff.short,.diff.outstanding,.diff.over{color:var(--fb-red-600);} .diff.excess{color:var(--fb-orange-600);}
    .diff.wrong_item{color:var(--fb-orange-600);}
    .mini { font-size:12px; color:var(--fb-muted); }
    .btn { border:1px solid var(--fb-border); background:var(--fb-surface); border-radius:var(--fb-radius-md);
      padding:9px 14px; font-size:13px; font-weight:600; color:var(--fb-text); min-height:44px; }
    .btn:hover { background:#F7F8FA; }
    .btn-primary { background:var(--fb-green-600); border-color:var(--fb-green-600); color:#fff; }
    .btn-primary:hover { background:var(--fb-green-700); }
    .btn-primary:disabled { background:#CBD5E1; border-color:#CBD5E1; cursor:not-allowed; }
    .resolved-pill { font-size:12px; font-weight:600; color:var(--fb-green-700); background:var(--fb-green-50);
      padding:5px 10px; border-radius:var(--fb-radius-full); }
    tr.is-resolved td { opacity:.55; }
    .bulkbar { display:flex; align-items:center; justify-content:space-between; margin-top:12px; padding:10px 6px 2px; }
    .bulkbar .sel { font-size:13px; color:var(--fb-text-2); }
    input[type=checkbox]{ width:20px; height:20px; accent-color:var(--fb-teal-800); }

    /* ── Drawer ── */
    #backdrop { position:fixed; inset:0; background:rgba(17,17,17,.35); opacity:0; visibility:hidden;
      transition:opacity .2s var(--fb-ease); z-index:20; }
    #backdrop.show { opacity:1; visibility:visible; }
    .drawer { position:fixed; top:0; right:0; height:100vh; width:min(560px,100%); background:var(--fb-surface);
      box-shadow:var(--fb-shadow-drawer); transform:translateX(100%); transition:transform .25s var(--fb-ease);
      z-index:21; display:flex; flex-direction:column; }
    .drawer.show { transform:translateX(0); }
    .drawer-head { padding:20px 22px 0; }
    .drawer-head .top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .drawer-head h2 { font-size:18px; margin:0; display:flex; align-items:center; gap:10px; }
    .pill-diff { font-size:12px; font-weight:700; padding:3px 9px; border-radius:var(--fb-radius-full);
      background:var(--fb-red-50); color:var(--fb-red-600); }
    .drawer-head .subline { font-size:12px; color:var(--fb-muted); margin:6px 0 14px; }
    .x { border:0; background:none; font-size:22px; line-height:1; color:var(--fb-muted); width:40px; height:40px; border-radius:50%; }
    .x:hover{ background:var(--fb-bg); }
    .tabs { display:flex; gap:20px; border-bottom:1px solid var(--fb-border); padding:0 22px; }
    .tab { border:0; background:none; padding:12px 2px; font-size:14px; font-weight:600; color:var(--fb-muted);
      border-bottom:2px solid transparent; margin-bottom:-1px; }
    .tab[aria-selected="true"] { color:var(--fb-teal-800); border-bottom-color:var(--fb-teal-800); }
    .tab .cnt { font-size:11px; background:var(--fb-bg); color:var(--fb-text-2); border-radius:var(--fb-radius-full); padding:1px 7px; margin-left:5px; }
    .drawer-body { flex:1; overflow-y:auto; padding:18px 22px; }
    .drawer-foot { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:14px 22px; border-top:1px solid var(--fb-border); }

    .drow { display:flex; gap:14px; padding:14px 0; border-bottom:1px solid var(--fb-border-soft); }
    .drow .ic { width:38px; height:38px; border-radius:10px; flex:0 0 auto; display:grid; place-items:center; font-size:18px; }
    .ic.exp{background:var(--fb-green-50);} .ic.act{background:var(--fb-teal-50);} .ic.dif{background:var(--fb-orange-50);}
    .ic.why{background:#F3E8FF;} .ic.res{background:var(--fb-teal-50);} .ic.ev{background:var(--fb-bg);} .ic.aft{background:var(--fb-teal-50);}
    .drow .k { font-size:13px; color:var(--fb-text-2); font-weight:600; }
    .drow .v { font-size:16px; font-weight:700; margin-top:2px; }
    .drow .rt { margin-left:auto; font-size:12px; color:var(--fb-muted); text-align:right; max-width:170px; }
    .reasons { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
    .reason { display:flex; gap:10px; align-items:flex-start; padding:12px; border:1px solid var(--fb-border);
      border-radius:var(--fb-radius-md); }
    .reason:hover { border-color:var(--fb-teal-600); }
    .reason.sel { border-color:var(--fb-green-600); background:var(--fb-green-50); }
    .reason input { margin-top:2px; width:18px; height:18px; accent-color:var(--fb-teal-800); }
    .reason .rl { font-weight:600; font-size:14px; }
    .reason .rd { font-size:12px; color:var(--fb-muted); margin-top:2px; }
    .impact { list-style:none; padding:0; margin:8px 0 0; }
    .impact li { display:flex; gap:8px; align-items:flex-start; font-size:14px; padding:4px 0; }
    .impact li::before { content:"✓"; color:var(--fb-green-600); font-weight:800; }
    .empty { color:var(--fb-muted); font-size:13px; padding:14px; background:var(--fb-bg); border-radius:var(--fb-radius-md); text-align:center; }
    .photos { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .photo { aspect-ratio:16/11; background:var(--fb-bg); border-radius:var(--fb-radius-md); display:grid; place-items:center; color:var(--fb-placeholder); font-size:12px; }
    .docrow, .cmt { display:flex; gap:10px; padding:12px 0; border-bottom:1px solid var(--fb-border-soft); }
    .doc-ic { width:34px; height:34px; border-radius:8px; background:var(--fb-red-50); color:var(--fb-red-600); display:grid; place-items:center; }
    .tl { position:relative; padding-left:26px; }
    .tl .ev { position:relative; padding:0 0 18px; }
    .tl .ev::before { content:""; position:absolute; left:-18px; top:4px; width:11px; height:11px; border-radius:50%;
      background:var(--fb-teal-600); box-shadow:0 0 0 3px var(--fb-teal-50); }
    .tl .ev::after { content:""; position:absolute; left:-13px; top:15px; bottom:0; width:2px; background:var(--fb-border); }
    .tl .ev:last-child::after { display:none; }
    .tl .et { font-size:11px; color:var(--fb-muted); }
    .tl .eh { font-weight:700; font-size:14px; margin:2px 0; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .tag { font-size:10px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; background:var(--fb-teal-50);
      color:var(--fb-teal-800); padding:2px 7px; border-radius:var(--fb-radius-full); }
    .ed { font-size:13px; color:var(--fb-text-2); }
    .eby { font-size:12px; color:var(--fb-muted); margin-top:3px; }
    .cmt .av { width:30px; height:30px; border-radius:50%; background:var(--fb-teal-50); color:var(--fb-teal-800);
      display:grid; place-items:center; font-weight:700; font-size:13px; flex:0 0 auto; }
    .cmt .cb b { font-size:13px; } .cmt .cw { font-size:11px; color:var(--fb-muted); margin-left:6px; }
    .cmt .ct { font-size:14px; margin-top:3px; }
    .composer { display:flex; gap:8px; margin-top:12px; }
    .composer input { flex:1; padding:12px 14px; border:1px solid var(--fb-border); border-radius:var(--fb-radius-md); font-size:14px; }
    .sect-h { font-size:11px; letter-spacing:.5px; text-transform:uppercase; color:var(--fb-muted); margin:6px 0 4px; }

    /* ── Success ── */
    .success { text-align:center; padding:8px 22px 22px; overflow-y:auto; }
    .success .check { width:88px; height:88px; border-radius:50%; background:var(--fb-green-600); color:#fff;
      display:grid; place-items:center; font-size:44px; margin:14px auto 8px; }
    .success h2 { margin:6px 0 2px; }
    .success p.s { color:var(--fb-muted); font-size:13px; margin:0 0 18px; }
    .rescard { border:1px solid var(--fb-border); border-radius:var(--fb-radius-lg); padding:16px; text-align:left; margin-bottom:14px; }
    .rescard .grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:8px; }
    .rescard .grid3 .k { font-size:10px; letter-spacing:.4px; text-transform:uppercase; color:var(--fb-muted); }
    .rescard .grid3 .v { font-weight:700; font-size:14px; }
    .summ { text-align:left; font-size:13px; }
    .summ .r { display:flex; justify-content:space-between; gap:12px; padding:7px 0; border-bottom:1px solid var(--fb-border-soft); }
    .summ .r .k { color:var(--fb-muted); } .summ .r .v { font-weight:600; text-align:right; }
    .routebox { background:var(--fb-green-50); border:1px solid #BBE7C6; border-radius:var(--fb-radius-md); padding:12px; text-align:left; font-size:13px; margin:14px 0; }
    .routebox b { color:var(--fb-green-700); }
    .banner { background:var(--fb-orange-50); border:1px solid var(--fb-orange-600); color:#9A3412; padding:12px 16px;
      border-radius:var(--fb-radius-md); margin:14px 0; font-size:13px; }

    @media (max-width:820px){
      .kpis{grid-template-columns:repeat(2,1fr);}
    }

    /* ── Phone (≤600px): field-first — stack cards, bigger targets, no horizontal scroll ── */
    @media (max-width:600px){
      header{ padding:12px 16px; }
      header .title{ font-size:17px; }
      main{ padding:16px 14px 100px; }
      .kpis{ grid-template-columns:repeat(2,1fr); gap:10px; }
      .kpi{ padding:12px; } .kpi .value{ font-size:22px; } .kpi .label{ font-size:11px; } .kpi .sub{ display:none; }
      /* declutter the settlement row: trim GRN + warehouse, tighten */
      .s-name{ font-size:16px; }
      .s-meta{ font-size:12px; } .s-meta .m-sec{ display:none; }
      .s-tags{ margin-top:8px; }
      .row-main{ padding:14px; gap:10px; }

      /* toolbar: search full width, chips scroll horizontally */
      .toolbar{ flex-direction:column; align-items:stretch; gap:10px; }
      .search{ min-width:0; }
      .chips{ overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px; }
      .chip{ white-space:nowrap; min-height:44px; }

      .row-main{ padding:14px; }
      .items{ padding:4px 12px 14px; }

      /* mismatch table → stacked cards (thead hidden, each row a card) */
      table.mm thead{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); }
      table.mm, table.mm tbody{ display:block; }
      table.mm tr{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px 10px;
        border:1px solid var(--fb-border); border-radius:var(--fb-radius-md); padding:12px;
        margin-bottom:10px; background:var(--fb-surface); }
      table.mm td{ display:block; border:0; padding:0; }
      table.mm td[data-label="Select"]{ display:none; }         /* bulk-select is a desktop power-tool */
      table.mm td.prodcell{ grid-column:1/-1; font-size:15px; padding-bottom:8px;
        border-bottom:1px solid var(--fb-border-soft); margin-bottom:2px; }
      table.mm td[data-label]::before{ content:attr(data-label); display:block; font-size:10px;
        letter-spacing:.4px; text-transform:uppercase; color:var(--fb-muted); font-weight:700; margin-bottom:3px; }
      table.mm td .mini{ font-size:11px; margin-top:2px; }
      table.mm td.actioncell{ grid-column:1/-1; padding-top:12px; }
      table.mm td.actioncell .btn{ width:100%; }
      .bulkbar{ display:none; }                                  /* selection hidden on phone */

      /* drawer is already full-screen on phone; let tabs scroll, tighten padding */
      .tabs{ overflow-x:auto; -webkit-overflow-scrolling:touch; gap:16px; }
      .tab{ white-space:nowrap; }
      .drawer-head{ padding:16px 16px 0; }
      .drawer-body{ padding:16px; }
      .drawer-foot{ padding:12px 16px; }
      .x{ width:44px; height:44px; }
      .photos{ grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="title">Settlement</div>
      <div class="sub">Purchase · Murli Bakery — Distribution</div>
    </div>
    <div class="user"><b>Murli Agrawal</b><span>Administrator</span></div>
  </header>

  <main id="main"><div class="empty" style="margin-top:40px">Loading settlements…</div></main>

  <div id="backdrop"></div>
  <aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Settlement detail"></aside>

  <!-- seed data as a global (see ../seed-data/seed.js); <script src> works on a direct file:// double-click -->
  <script src="../seed-data/seed.js"></script>
  <script>
    const CUR = { id:'u-murli', name:'Murli Agrawal' };
    let DATA = null;
    const state = { stream:'ALL', q:'', expanded:new Set(), sel:{}, drawer:null };

    // ---------- load ----------
    // NB: called at the very end of this script (see boot()), so the const helpers
    // below (openItems, supplier, …) are initialized before render() runs.
    function boot(){
      if(window.SEED){
        DATA = window.SEED;
        render();
      } else {
        document.getElementById('main').innerHTML =
          '<div class="banner"><b>Could not find seed data.</b> Ensure <code>seed-data/seed.js</code> '+
          '(which sets <code>window.SEED</code>) sits next to this <code>screens/</code> folder.</div>';
      }
    }

    // ---------- helpers ----------
    const inr = n => '₹' + new Intl.NumberFormat('en-IN').format(Math.abs(n));
    const supplier = id => (DATA.suppliers.find(s=>s.id===id)||{}).name || id;
    const warehouse = id => (DATA.warehouses.find(w=>w.id===id)||{}).name || id;
    const actor = id => DATA.actors.find(a=>a.id===id) || {name:id, role:''};
    const reason = id => DATA.reasonCodes.find(r=>r.id===id) || {};
    const isOpenItem = it => !it.resolution;
    const openItems = s => s.items.filter(isOpenItem);
    const fmtQty = (v,u) => u==='INR' ? inr(v) : (Math.abs(v)+' '+(u||'units'));
    const fmtDiff = d => (d.qty>0?'+':'−') + (d.unit==='INR'? inr(d.qty) : (Math.abs(d.qty)+' '+d.unit));

    function badgeLabel(s){
      const n = openItems(s).length || s.items.length;
      if(s.stream==='PAYMENT') return n+' Payment mismatch';
      if(s.stream==='ASSET') return n+' Asset'+(n>1?'s':'')+' outstanding';
      return n+' Product Mismatch';
    }
    function statusMeta(st){
      if(st==='OPEN') return ['open','Open'];
      if(st==='RECONCILED') return ['done','Reconciled'];
      const map={UNDER_VERIFICATION:'Under verification',UNDER_INVESTIGATION:'Under investigation',
        AWAITING_APPROVAL:'Awaiting approval',PARTIALLY_RECOVERED:'Partially recovered'};
      return ['progress', map[st]||st];
    }
    function reasonsFor(stream){ return DATA.reasonCodes.filter(r=>r.streams.includes(stream)); }

    // impact preview from a reason + item
    function impactFor(rid, it){
      const r = reason(rid), u = it.difference.unit, n = Math.abs(it.difference.qty);
      const amt = u==='INR'? inr(it.difference.qty) : (n+' '+u);
      switch(rid){
        case 'accept_shortage': case 'write_off':
          return ['Write off '+amt+' as inventory loss','Reduce warehouse stock by '+amt,'Close this mismatch item'];
        case 'supplier_shortage':
          return ['Raise recovery of '+amt+' from '+supplier(it._sup),'Reduce payable accordingly','Close this mismatch item'];
        case 'transit_loss':
          return ['Raise recovery of '+amt+' from transporter','Close this mismatch item'];
        case 'damaged_goods':
          return ['Request replacement / credit for '+amt,'Hold '+amt+' out of sellable stock','Keep item open until settled'];
        case 'quality_rejection': case 'wrong_product':
          return ['Return '+amt+' to '+supplier(it._sup),'Await replacement dispatch','Keep item open until settled'];
        case 'excess_received':
          return ['Accept '+amt+' excess into stock','Raise revised invoice (increase payable)','Close this mismatch item'];
        case 'stock_recount':
          return ['Flag for physical recount','Keep item open until recount posted'];
        case 'partial_payment':
          return ['Keep '+amt+' payable open','Schedule balance payment','Remain OPEN — carry forward'];
        case 'credit_note':
          return ['Reduce payable by '+amt,'Post credit note to supplier ledger','Close this mismatch item'];
        case 'debit_note':
          return ['Increase payable by '+amt,'Post debit note to supplier ledger','Close this mismatch item'];
        case 'rate_difference':
          return ['Recalculate payable ('+fmtDiff(it.difference)+')','Update supplier ledger on approval','Close this mismatch item'];
        case 'outstanding_return':
          return ['Keep '+amt+' outstanding against '+supplier(it._sup),'Carry forward to next transaction','Remain OPEN'];
        case 'asset_write_off':
          return ['Write off '+amt+' as unrecoverable assets','Close this mismatch item'];
        case 'keep_open':
          return ['Keep '+amt+' outstanding','Carry forward to next transaction','Remain OPEN'];
        default:
          return [r.effect||'Record decision','Close this mismatch item'];
      }
    }
    // reasons that keep the item open rather than close it
    const KEEP_OPEN = new Set(['keep_open','outstanding_return','partial_payment','quality_rejection','wrong_product','damaged_goods','stock_recount']);

    function refId(prefix){
      const d = DATA.meta.asOfDate.replace(/-/g,'-');
      const t = String(Math.floor(1000+Math.random()*8999));
      return prefix+'-'+d+'-'+t;
    }

    // ---------- render list ----------
    function visibleSettlements(){
      const q = state.q.trim().toLowerCase();
      return DATA.settlements.filter(s=>{
        if(state.stream!=='ALL' && s.stream!==state.stream) return false;
        if(!q) return true;
        const hay = [s.poNumber,s.grnNumber,s.invoiceNumber,supplier(s.supplierId),
          ...s.items.map(i=>i.product)].join(' ').toLowerCase();
        return hay.includes(q);
      });
    }
    function kpiOpenMismatches(){ return DATA.settlements.reduce((a,s)=>a+openItems(s).length,0); }
    function kpiOpenSettlements(){ return DATA.settlements.filter(s=>openItems(s).length>0).length; }

    function render(){
      const k = DATA.kpis.map(x=>{
        let v = x.value;
        if(x.id==='mismatch-to-settle') v = kpiOpenMismatches();
        if(x.id==='open-settlements') v = kpiOpenSettlements();
        return `<div class="kpi"><div class="label">${x.label}</div><div class="value">${v}</div><div class="sub">${x.sub}</div></div>`;
      }).join('');

      const chips = [['ALL','All'],['PRODUCT','Product'],['PAYMENT','Payment'],['ASSET','Asset']]
        .map(([v,l])=>`<button class="chip" data-stream="${v}" aria-pressed="${state.stream===v}">${l}</button>`).join('');

      const rows = visibleSettlements().map(renderSettlement).join('') ||
        `<div class="empty" style="padding:30px">No settlements match “${state.q}”.</div>`;

      document.getElementById('main').innerHTML = `
        <div class="kpis">${k}</div>
        <div class="toolbar">
          <div class="search"><input id="q" type="search" placeholder="Search by PO, GRN, supplier or product…" value="${state.q}"></div>
          <div class="chips">${chips}</div>
        </div>
        <div class="list">
          ${rows}
        </div>`;

      // wire
      const q = document.getElementById('q');
      if(q) q.oninput = e=>{ state.q=e.target.value; const p=q.selectionStart; render(); const n=document.getElementById('q'); n.focus(); n.setSelectionRange(p,p); };
      document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{ state.stream=c.dataset.stream; render(); });
      document.querySelectorAll('.row-main').forEach(r=>r.onclick=()=>{ const id=r.dataset.id;
        state.expanded.has(id)?state.expanded.delete(id):state.expanded.add(id); render(); });
      document.querySelectorAll('[data-resolve]').forEach(b=>b.onclick=e=>{ e.stopPropagation();
        openDrawer(b.dataset.sid, b.dataset.iid); });
      document.querySelectorAll('[data-check]').forEach(c=>c.onchange=e=>{ e.stopPropagation();
        toggleSel(c.dataset.sid, c.dataset.iid, c.checked); });
      document.querySelectorAll('[data-check]').forEach(c=>c.onclick=e=>e.stopPropagation());
      document.querySelectorAll('[data-bulk]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); openBulk(b.dataset.sid); });
      document.querySelectorAll('[data-clear]').forEach(b=>b.onclick=e=>{ e.stopPropagation();
        state.sel[b.dataset.sid]=new Set(); render(); });
    }

    function renderSettlement(s){
      const [scls,slbl] = statusMeta(s.status);
      const exp = state.expanded.has(s.id);
      const ref = s.grnNumber||s.invoiceNumber||'';
      const head = `
        <button class="row-main" data-id="${s.id}" aria-expanded="${exp}">
          <span class="dot ${s.priority}"></span>
          <div class="s-main">
            <div class="s-name">${supplier(s.supplierId)}</div>
            <div class="s-meta">${s.poNumber}<span class="m-sec"> · ${ref}</span> · ${s.receiptDate}<span class="m-sec"> · ${warehouse(s.warehouseId)}</span></div>
            <div class="s-tags">
              <span class="badge">▦ ${badgeLabel(s)}</span>
              <span class="status ${scls}"><span class="sdot"></span>${slbl}</span>
              <span class="age">${s.lastUpdatedLabel}</span>
            </div>
          </div>
          <span class="chev">›</span>
        </button>`;
      return `<div class="settlement ${exp?'expanded':''}">${head}${exp?renderItems(s):''}</div>`;
    }

    function renderItems(s){
      const sel = state.sel[s.id] || new Set();
      const money = s.stream!=='PRODUCT';
      const rows = s.items.map(it=>{
        const resolved = !!it.resolution;
        const check = (resolved) ? '' :
          `<input type="checkbox" data-check data-sid="${s.id}" data-iid="${it.id}" ${sel.has(it.id)?'checked':''} aria-label="Select ${it.product}">`;
        const action = resolved
          ? `<span class="resolved-pill">✓ Resolved</span>`
          : `<button class="btn" data-resolve data-sid="${s.id}" data-iid="${it.id}">View &amp; Resolve</button>`;
        return `<tr class="${resolved?'is-resolved':''}">
          <td data-label="Select">${check}</td>
          <td class="prodcell"><strong>${it.product}</strong>${it.carryForward?' <span class="mini">· carry-forward</span>':''}</td>
          <td class="num" data-label="Expected">${fmtQty(it.expected.qty,it.difference.unit==='INR'?'INR':it.uom)}<div class="mini">${it.expected.note||''}</div></td>
          <td class="num" data-label="Actual">${fmtQty(it.actual.qty,it.difference.unit==='INR'?'INR':it.uom)}<div class="mini">${it.actual.breakdown||it.actual.note||''}</div></td>
          <td data-label="Difference"><span class="diff ${it.difference.direction}">${fmtDiff(it.difference)}</span></td>
          <td class="actioncell" style="text-align:right">${action}</td>
        </tr>`;
      }).join('');
      const nSel = sel.size;
      return `<div class="items">
        <div class="items-title">Mismatch items (${s.items.length})</div>
        <table class="mm"><thead><tr><th></th><th>Product</th><th>Expected</th><th>Actual</th><th>Difference</th><th></th></tr></thead>
        <tbody>${rows}</tbody></table>
        <div class="bulkbar">
          <div class="sel">${nSel?`${nSel} item${nSel>1?'s':''} selected · <a href="#" data-clear data-sid="${s.id}">Clear</a>`:'Select items to resolve together'}</div>
          <button class="btn btn-primary" data-bulk data-sid="${s.id}" ${nSel?'':'disabled'}>▤ Bulk Resolve (${nSel})</button>
        </div>
      </div>`;
    }

    function toggleSel(sid,iid,on){
      state.sel[sid] = state.sel[sid] || new Set();
      on ? state.sel[sid].add(iid) : state.sel[sid].delete(iid);
      render();
    }

    // ---------- drawer: single item ----------
    function openDrawer(sid,iid){
      const s = DATA.settlements.find(x=>x.id===sid);
      const it = s.items.find(x=>x.id===iid); it._sup = s.supplierId;
      state.drawer = { sid, iid, tab:'details', reason: it.suggestedResolutionId||null };
      paintDrawer(s,it); showDrawer();
    }
    function paintDrawer(s,it){
      const d = state.drawer;
      const evCount = (it.evidence.photos.length+it.evidence.documents.length+it.evidence.other.length);
      const tab = (id,label,cnt)=>`<button class="tab" data-tab="${id}" aria-selected="${d.tab===id}">${label}${cnt!=null?`<span class="cnt">${cnt}</span>`:''}</button>`;
      document.getElementById('drawer').innerHTML = `
        <div class="drawer-head">
          <div class="top">
            <h2>${it.product} <span class="pill-diff">${fmtDiff(it.difference)}</span></h2>
            <button class="x" data-close aria-label="Close">×</button>
          </div>
          <div class="subline">${supplier(s.supplierId)} · ${s.poNumber} · ${s.receiptDate}</div>
        </div>
        <div class="tabs">
          ${tab('details','Details')}
          ${tab('evidence','Evidence',evCount)}
          ${tab('activity','Activity Log')}
          ${tab('comments','Comments',it.comments.length)}
        </div>
        <div class="drawer-body" id="dbody">${drawerTab(s,it)}</div>
        <div class="drawer-foot">
          <button class="btn" data-keep>Keep Pending</button>
          <button class="btn btn-primary" data-do ${d.reason?'':'disabled'}>Resolve</button>
        </div>`;
      wireDrawer(s,it);
    }
    function drawerTab(s,it){
      const d = state.drawer;
      if(d.tab==='details'){
        const rs = reasonsFor(s.stream).map(r=>`
          <label class="reason ${d.reason===r.id?'sel':''}">
            <input type="radio" name="reason" value="${r.id}" ${d.reason===r.id?'checked':''}>
            <div><div class="rl">${r.label}</div><div class="rd">${r.description}</div></div>
          </label>`).join('');
        const impact = d.reason ? impactFor(d.reason,it).map(x=>`<li>${x}</li>`).join('') : '<li class="mini" style="color:#888">Pick a reason to preview the impact.</li>';
        return `
          <div class="drow"><div class="ic exp">▤</div><div><div class="k">Expected</div><div class="v">${fmtQty(it.expected.qty,it.difference.unit==='INR'?'INR':it.uom)}</div></div><div class="rt">${it.expected.note||''}</div></div>
          <div class="drow"><div class="ic act">▦</div><div><div class="k">Actual</div><div class="v">${fmtQty(it.actual.qty,it.difference.unit==='INR'?'INR':it.uom)}</div></div><div class="rt">${it.actual.breakdown||it.actual.note||''}</div></div>
          <div class="drow"><div class="ic dif">△</div><div><div class="k">Difference</div><div class="v" style="color:var(--fb-red-600)">${fmtDiff(it.difference)}</div></div></div>
          <div class="drow"><div class="ic why">?</div><div><div class="k">Why this needs settlement</div><div class="ed" style="margin-top:4px">${it.whyText}</div></div></div>
          <div style="padding:14px 0 4px"><div class="k" style="font-weight:600">Suggested resolution</div><div class="reasons">${rs}</div></div>
          <div class="drow" style="border:0"><div class="ic aft">⇲</div><div style="flex:1"><div class="k">After settlement</div><ul class="impact">${impact}</ul></div></div>`;
      }
      if(d.tab==='evidence'){
        const ph = it.evidence.photos.length
          ? `<div class="sect-h">Photos (${it.evidence.photos.length})</div><div class="photos">${it.evidence.photos.map(p=>`<div class="photo">▣ ${p.caption||'Photo'}</div>`).join('')}</div>` : '';
        const dc = it.evidence.documents.length
          ? `<div class="sect-h" style="margin-top:16px">Documents (${it.evidence.documents.length})</div>${it.evidence.documents.map(x=>`<div class="docrow"><div class="doc-ic">▤</div><div><div style="font-weight:600;font-size:13px">${x.name}</div><div class="mini">PDF · ${x.sizeKb} KB</div></div></div>`).join('')}` : '';
        const ot = `<div class="sect-h" style="margin-top:16px">Other proof</div>${it.evidence.other.length?it.evidence.other.map(o=>`<div class="docrow">${o.caption||o}</div>`).join(''):'<div class="empty">No other proof captured for this item.</div>'}`;
        const note = `<div class="banner" style="background:var(--fb-teal-50);border-color:var(--fb-teal-600);color:var(--fb-teal-800);margin-top:16px">Evidence is captured at goods receipt. If something is missing, add it in the Comments tab.</div>`;
        return (ph+dc+ot+note) || '<div class="empty">No evidence captured.</div>';
      }
      if(d.tab==='activity'){
        return `<div class="tl">${it.activityLog.map(e=>{
          const a = actor(e.actorId);
          return `<div class="ev"><div class="et">${e.ts}</div>
            <div class="eh">${e.title} ${e.ref?`<span class="tag">${e.ref}</span>`:''}</div>
            <div class="ed">${e.detail}</div>
            <div class="eby">By ${a.name}${a.role?` · ${a.role}`:''}</div></div>`;
        }).join('')}</div>`;
      }
      // comments
      const list = it.comments.length ? it.comments.map(c=>{
        const a = actor(c.authorId);
        return `<div class="cmt"><div class="av">${(a.name||'?')[0]}</div><div class="cb"><div><b>${a.name}</b><span class="cw">${c.ts}</span></div><div class="ct">${c.text}</div></div></div>`;
      }).join('') : '<div class="empty">No comments yet.</div>';
      return `<div id="cmts">${list}</div>
        <div class="composer"><input id="cin" placeholder="Leave a comment…"><button class="btn btn-primary" data-cmt>Send</button></div>`;
    }
    function wireDrawer(s,it){
      const dr = document.getElementById('drawer');
      dr.querySelector('[data-close]').onclick = hideDrawer;
      dr.querySelector('[data-keep]').onclick = hideDrawer;
      dr.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ state.drawer.tab=t.dataset.tab;
        dr.querySelector('#dbody').innerHTML = drawerTab(s,it); wireBody(s,it);
        dr.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-selected', x.dataset.tab===state.drawer.tab)); });
      const doBtn = dr.querySelector('[data-do]');
      if(doBtn) doBtn.onclick = ()=>resolveOne(s,it);
      wireBody(s,it);
    }
    function wireBody(s,it){
      const dr = document.getElementById('drawer');
      dr.querySelectorAll('input[name=reason]').forEach(r=>r.onchange=()=>{ state.drawer.reason=r.value;
        dr.querySelector('#dbody').innerHTML = drawerTab(s,it); wireBody(s,it);
        dr.querySelector('[data-do]').disabled = false; });
      const cmt = dr.querySelector('[data-cmt]');
      if(cmt) cmt.onclick=()=>{ const v=dr.querySelector('#cin').value.trim(); if(!v) return;
        it.comments.push({authorId:CUR.id, ts:'just now', text:v});
        dr.querySelector('#dbody').innerHTML=drawerTab(s,it); wireBody(s,it);
        dr.querySelectorAll('.tab').forEach(x=>{ if(x.dataset.tab==='comments'){ const c=x.querySelector('.cnt'); if(c)c.textContent=it.comments.length; }}); };
    }

    function resolveOne(s,it){
      const rid = state.drawer.reason;
      it.resolution = { reasonId:rid, resolvedById:CUR.id, resolvedOn:'just now',
        referenceId:refId('SET-RES'), impact:impactFor(rid,it), keptOpen:KEEP_OPEN.has(rid) };
      showSuccess(successSingle(s,it), ()=>{ // next item
        const nxt = openItems(s)[0];
        if(nxt){ openDrawer(s.id, nxt.id); } else { hideDrawer(); render(); }
      });
    }
    function successSingle(s,it){
      const r = it.resolution, rc = reason(r.reasonId), a = actor(r.resolvedById);
      return `<div class="success">
        <div class="check">✓</div>
        <h2>${r.keptOpen?'Decision Recorded':'Settlement Resolved'}</h2>
        <p class="s">${r.keptOpen?'This item stays open and will carry forward.':'This mismatch has been successfully resolved.'}</p>
        <div class="rescard"><strong>${it.product}</strong>
          <div class="grid3">
            <div><div class="k">Expected</div><div class="v">${fmtQty(it.expected.qty,it.difference.unit==='INR'?'INR':it.uom)}</div></div>
            <div><div class="k">Actual</div><div class="v">${fmtQty(it.actual.qty,it.difference.unit==='INR'?'INR':it.uom)}</div></div>
            <div><div class="k">Difference</div><div class="v" style="color:var(--fb-red-600)">${fmtDiff(it.difference)}</div></div>
          </div>
        </div>
        <div class="summ">
          <div class="r"><span class="k">Reason</span><span class="v">${rc.label}</span></div>
          <div class="r"><span class="k">Resolved by</span><span class="v">${a.name}</span></div>
          <div class="r"><span class="k">Resolved on</span><span class="v">${r.resolvedOn}</span></div>
          <div class="r"><span class="k">Impact</span><span class="v">${r.impact.join('<br>')}</span></div>
          <div class="r"><span class="k">Reference ID</span><span class="v">${r.referenceId}</span></div>
        </div>
        <div class="routebox">✓ <b>Supplier ledger updated.</b> This resolution feeds ${supplier(s.supplierId)}'s reliability score.</div>
        <div class="drawer-foot" style="border:0;padding:0">
          <button class="btn" data-back>Back to list</button>
          <button class="btn btn-primary" data-next>${openItems(s).length?'Next item →':'Done'}</button>
        </div>
      </div>`;
    }

    // ---------- bulk ----------
    function openBulk(sid){
      const s = DATA.settlements.find(x=>x.id===sid);
      const ids = [...(state.sel[sid]||new Set())];
      const items = s.items.filter(i=>ids.includes(i.id)); items.forEach(i=>i._sup=s.supplierId);
      state.bulk = { sid, items, reason:null };
      paintBulk(s,items); showDrawer();
    }
    function paintBulk(s,items){
      const b = state.bulk;
      const rows = items.map(it=>`<tr><td><strong>${it.product}</strong></td>
        <td class="num">${fmtQty(it.expected.qty,it.difference.unit==='INR'?'INR':it.uom)}</td>
        <td class="num">${fmtQty(it.actual.qty,it.difference.unit==='INR'?'INR':it.uom)}</td>
        <td><span class="diff ${it.difference.direction}">${fmtDiff(it.difference)}</span></td></tr>`).join('');
      const rs = reasonsFor(s.stream).map(r=>`
        <label class="reason ${b.reason===r.id?'sel':''}">
          <input type="radio" name="breason" value="${r.id}" ${b.reason===r.id?'checked':''}>
          <div><div class="rl">${r.label}</div><div class="rd">${r.description}</div></div>
        </label>`).join('');
      const totalUnit = items[0].difference.unit;
      const sameUnit = items.every(i=>i.difference.unit===totalUnit);
      const total = items.reduce((a,i)=>a+Math.abs(i.difference.qty),0);
      const totalTxt = sameUnit ? (totalUnit==='INR'?inr(total):total+' '+totalUnit) : total+' units';
      const impact = b.reason
        ? [`Apply “${reason(b.reason).label}” to ${items.length} items`, `Total impact: ${totalTxt} across ${items.length} items`, `Close ${items.length} mismatch items`].map(x=>`<li>${x}</li>`).join('')
        : '<li class="mini" style="color:#888">Pick one reason to apply to all.</li>';
      document.getElementById('drawer').innerHTML = `
        <div class="drawer-head"><div class="top"><h2>Bulk Resolve</h2><button class="x" data-close aria-label="Close">×</button></div>
          <div class="subline">${items.length} items selected · ${supplier(s.supplierId)} · ${s.poNumber}</div></div>
        <div class="drawer-body">
          <div class="sect-h">Selected items</div>
          <table class="mm"><thead><tr><th>Product</th><th>Expected</th><th>Actual</th><th>Difference</th></tr></thead><tbody>${rows}</tbody></table>
          <div class="sect-h" style="margin-top:18px">Resolution reason — applies to all ${items.length}</div>
          <div class="reasons">${rs}</div>
          <div class="drow" style="border:0;margin-top:10px"><div class="ic aft">⇲</div><div style="flex:1"><div class="k">Impact preview</div><ul class="impact">${impact}</ul></div></div>
        </div>
        <div class="drawer-foot"><button class="btn" data-close>Keep Pending</button>
          <button class="btn btn-primary" data-doall ${b.reason?'':'disabled'}>Resolve All (${items.length})</button></div>`;
      const dr = document.getElementById('drawer');
      dr.querySelectorAll('[data-close]').forEach(x=>x.onclick=hideDrawer);
      dr.querySelectorAll('input[name=breason]').forEach(r=>r.onchange=()=>{ state.bulk.reason=r.value; paintBulk(s,items); });
      const da = dr.querySelector('[data-doall]'); if(da) da.onclick=()=>resolveBulk(s,items);
    }
    function resolveBulk(s,items){
      const rid = state.bulk.reason, ref = refId('SET-BULK');
      items.forEach(it=>{ it.resolution={reasonId:rid,resolvedById:CUR.id,resolvedOn:'just now',referenceId:ref,impact:impactFor(rid,it),keptOpen:KEEP_OPEN.has(rid)}; });
      state.sel[s.id]=new Set();
      const rc=reason(rid);
      const list = items.map(it=>`<div class="summ"><div class="r"><span class="k">${it.product}</span><span class="v">${fmtDiff(it.difference)}</span></div></div>`).join('');
      showSuccess(`<div class="success">
        <div class="check">✓</div><h2>Bulk Settlement Resolved</h2>
        <p class="s">${items.length} mismatches have been successfully resolved.</p>
        <div class="rescard">${list}</div>
        <div class="summ">
          <div class="r"><span class="k">Reason</span><span class="v">${rc.label}</span></div>
          <div class="r"><span class="k">Resolved by</span><span class="v">${CUR.name}</span></div>
          <div class="r"><span class="k">Reference ID</span><span class="v">${ref}</span></div>
        </div>
        <div class="routebox">✓ <b>Supplier ledger updated</b> for ${items.length} items.</div>
        <div class="drawer-foot" style="border:0;padding:0"><button class="btn" data-back>Back to list</button><button class="btn btn-primary" data-back>Done</button></div>
      </div>`, ()=>{});
    }

    // ---------- overlay plumbing ----------
    function showDrawer(){ document.getElementById('backdrop').classList.add('show');
      document.getElementById('drawer').classList.add('show'); }
    function hideDrawer(){ document.getElementById('backdrop').classList.remove('show');
      document.getElementById('drawer').classList.remove('show'); state.drawer=null; state.bulk=null; render(); }
    function showSuccess(html, onNext){
      const dr=document.getElementById('drawer'); dr.innerHTML=html; dr.classList.add('show');
      document.getElementById('backdrop').classList.add('show');
      dr.querySelectorAll('[data-back]').forEach(b=>b.onclick=hideDrawer);
      const n=dr.querySelector('[data-next]'); if(n) n.onclick=()=>onNext();
    }
    document.getElementById('backdrop').onclick = hideDrawer;
    document.addEventListener('keydown', e=>{ if(e.key==='Escape') hideDrawer(); });

    boot();  // run last: all const helpers above are now initialized
  </script>
</body>
</html>
